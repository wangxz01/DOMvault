<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>DOMVault</title>
<style>
  :root {
    --bg: #f6f7fb;
    --panel: #ffffff;
    --ink: #1a1a2e;
    --muted: #6b7280;
    --accent: #4f46e5;
    --accent-hover: #4338ca;
    --danger: #dc2626;
    --success: #16a34a;
    --border: #e5e7eb;
    --radius: 10px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
  }
  .wrap {
    max-width: 760px;
    margin: 0 auto;
    padding: 32px 20px 64px;
  }
  header h1 {
    font-size: 24px;
    margin: 0 0 4px;
  }
  header p {
    margin: 0 0 24px;
    color: var(--muted);
    font-size: 14px;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 6px;
    color: var(--muted);
  }
  .row {
    display: flex;
    gap: 8px;
    align-items: stretch;
  }
  input[type="text"] {
    flex: 1;
    padding: 10px 12px;
    font-size: 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    outline: none;
    font-family: inherit;
  }
  input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
  }
  button {
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 600;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s, opacity 0.15s;
  }
  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
  .btn-save { background: var(--success); color: #fff; }
  .btn-save:hover:not(:disabled) { background: #15803d; }
  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover:not(:disabled) { background: #f3f4f6; }
  .status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    min-height: 20px;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #d1d5db;
    flex-shrink: 0;
  }
  .dot.open { background: var(--success); }
  .status-text { color: var(--muted); word-break: break-all; }
  .status-text strong { color: var(--ink); }
  .error {
    color: var(--danger);
    font-size: 13px;
    min-height: 18px;
  }
  .result {
    font-size: 13px;
    background: #f0fdf4;
    border: 1px solid #bbf7d0;
    border-radius: 8px;
    padding: 12px 14px;
    word-break: break-all;
  }
  .result .path { color: var(--ink); font-family: ui-monospace, Consolas, monospace; font-size: 12px; }
  .result a { color: var(--accent); font-weight: 600; }
  .hint { font-size: 12px; color: var(--muted); margin-top: 10px; }
  .hidden { display: none; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>DOMVault</h1>
    <p>Open a URL with Playwright, interact with the page, then capture the current rendered HTML.</p>
  </header>

  <section class="card">
    <label for="url">URL</label>
    <div class="row">
      <input id="url" type="text" placeholder="example.com" autocomplete="off" />
      <button id="openBtn" class="btn-primary" type="button">Open</button>
    </div>
    <p class="hint">No scheme is needed — <code>https://</code> is added automatically.</p>
    <div class="status" style="margin-top:14px">
      <span id="dot" class="dot"></span>
      <span id="statusText" class="status-text">No browser session.</span>
    </div>
    <div id="error" class="error" style="margin-top:8px"></div>
  </section>

  <section class="card">
    <label>Capture</label>
    <div class="row">
      <button id="saveBtn" class="btn-save" type="button" disabled>Save current HTML</button>
      <button id="closeBtn" class="btn-ghost" type="button" disabled>Close browser</button>
    </div>
    <div id="result" class="result hidden" style="margin-top:14px"></div>
  </section>
</div>

<script>
(function () {
  "use strict";

  const urlEl = document.getElementById("url");
  const openBtn = document.getElementById("openBtn");
  const saveBtn = document.getElementById("saveBtn");
  const closeBtn = document.getElementById("closeBtn");
  const dotEl = document.getElementById("dot");
  const statusTextEl = document.getElementById("statusText");
  const errorEl = document.getElementById("error");
  const resultEl = document.getElementById("result");

  function setError(msg) {
    errorEl.textContent = msg || "";
  }
  function clearResult() {
    resultEl.classList.add("hidden");
    resultEl.innerHTML = "";
  }
  function showResult(payload) {
    resultEl.classList.remove("hidden");
    resultEl.innerHTML =
      '<div>Saved <strong>' + escapeHtml(payload.filename) + '</strong></div>' +
      '<div class="path">' + escapeHtml(payload.path) + '</div>' +
      '<div style="margin-top:6px"><a href="' + escapeHtml(payload.download_url) + '" target="_blank">Download / open file</a></div>';
  }
  function escapeHtml(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
  }
  function renderStatus(s) {
    if (s.open) {
      dotEl.classList.add("open");
      statusTextEl.innerHTML = "Open: <strong>" + escapeHtml(s.title || "(no title)") + "</strong> — " + escapeHtml(s.url || "");
      saveBtn.disabled = false;
      closeBtn.disabled = false;
    } else {
      dotEl.classList.remove("open");
      statusTextEl.textContent = "No browser session.";
      saveBtn.disabled = true;
      closeBtn.disabled = true;
    }
  }

  async function postJSON(path, body) {
    const resp = await fetch(path, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body || {}),
    });
    const data = await resp.json().catch(() => ({ detail: "Invalid server response." }));
    if (!resp.ok) {
      const detail = data.detail || ("HTTP " + resp.status);
      throw new Error(typeof detail === "string" ? detail : JSON.stringify(detail));
    }
    return data;
  }

  async function doOpen() {
    setError("");
    clearResult();
    const url = urlEl.value.trim();
    if (!url) { setError("Please enter a URL."); return; }
    openBtn.disabled = true;
    try {
      const s = await postJSON("/api/open", { url: url });
      renderStatus(s);
    } catch (e) {
      setError(e.message);
      await refreshStatus();
    } finally {
      openBtn.disabled = false;
    }
  }

  async function doSave() {
    setError("");
    saveBtn.disabled = true;
    try {
      const payload = await postJSON("/api/save", {});
      showResult(payload);
    } catch (e) {
      setError(e.message);
    } finally {
      saveBtn.disabled = false;
    }
  }

  async function doClose() {
    setError("");
    clearResult();
    closeBtn.disabled = true;
    try {
      await postJSON("/api/close", {});
      await refreshStatus();
    } catch (e) {
      setError(e.message);
    } finally {
      closeBtn.disabled = false;
    }
  }

  async function refreshStatus() {
    try {
      const resp = await fetch("/api/status");
      const s = await resp.json();
      renderStatus(s);
    } catch {
      // server unreachable; leave UI as-is
    }
  }

  openBtn.addEventListener("click", doOpen);
  saveBtn.addEventListener("click", doSave);
  closeBtn.addEventListener("click", doClose);
  urlEl.addEventListener("keydown", function (e) {
    if (e.key === "Enter") { e.preventDefault(); doOpen(); }
  });

  // Poll status every 2s so the panel reflects manual navigation / window close.
  setInterval(refreshStatus, 2000);
  refreshStatus();
})();
</script>
</body>
</html>
